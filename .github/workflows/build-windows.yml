# Windows MSI + NSIS na GitHub runneru (ne radi lokalno sa Mac/Linux za MSI).
# Posle builda: Actions → ovaj workflow → Artifacts → Evidencija-Otpada-Windows

name: Build Windows installers

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Vite + Rust + MSI + NSIS)
        run: npm run tauri:build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: Evidencija-Otpada-Windows-installers
          path: |
            src-tauri/target/release/bundle/msi/
            src-tauri/target/release/bundle/nsis/
          if-no-files-found: error
